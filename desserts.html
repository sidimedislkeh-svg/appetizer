<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPETIZER — Desserts</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
</head>
<body dir="rtl">

<header class="header category-header">

  <div class="category-header-top">

    <div class="category-logo">
      <img src="logo.webp" alt="APPETIZER Logo" />
    </div>

    <h1 class="category-brand">APPET<span>IZER</span></h1>

    <button class="back-btn" id="back-btn" aria-label="Back">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      <span class="back-label">العودة</span>
    </button>

  </div>

  <p class="page-title" data-i18n="desserts">تحلية</p>
  <p class="page-subtitle">APPETIZER</p>

</header>

  <main class="main">
    <div
      class="products-grid"
      id="products-grid"
      data-category="desserts"
      role="list"
    >
      <!-- Rendered by script.js -->
    </div>
  </main>

  <footer class="footer">
    <p>© 2025 APPETIZER</p>
  </footer>

  <script src="products.js"></script>
  <script src="script.js"></script>
</body>
</html>
