<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APPETIZER — Menu</title>
  <meta name="description" content="Digital menu for APPETIZER restaurant" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
</head>
<body dir="rtl">

  <!-- ── Header ── -->
<header class="header">
  <div class="header-inner">

    <div class="lang-switcher" role="group" aria-label="Language">
      <button class="lang-btn active" data-lang="ar">عربي</button>
      <button class="lang-btn" data-lang="fr">Français</button>
      <button class="lang-btn" data-lang="en">English</button>
    </div>

    <div class="logo-circle">
      <img src="images/logo.webp" alt="APPETIZER Logo" />
    </div>

    <div class="brand-area">
      <div class="top-ornament">
        <span></span>

        <svg class="cutlery-icon" viewBox="0 0 120 80" aria-hidden="true">
          <path d="M34 6h6v28c0 8-4 14-11 17v24h-8V51C14 48 10 42 10 34V6h6v28h4V6h5v28h4V6h5v28h4V6z"/>
          <path d="M80 6c18 14 24 38 13 54-3 5-8 8-14 10v5h-8V69c-10-4-17-12-19-23C49 29 61 12 80 6z"/>
        </svg>

        <span></span>
      </div>

      <h1 class="main-title">APPET<span>IZER</span></h1>

      <div class="bottom-ornament">
        <span></span>
        <i></i>
        <span></span>
      </div>
    </div>

  </div>
</header>

  <!-- ── Main ── -->
  <main class="main">
    <div class="gold-divider"></div>
    <div class="categories-grid" id="categories-grid" role="list">
      <!-- Rendered by script.js -->
    </div>
    <div class="gold-divider" style="margin-top:24px"></div>
  </main>

  <footer class="footer">
    <p>© 2025 APPETIZER</p>
  </footer>

  <script src="products.js"></script>
  <script src="script.js"></script>
</body>
</html>
